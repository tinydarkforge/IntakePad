<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntakePad Premium Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.css">
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --sidebar: #f1f5f9;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --accent-fg: #ffffff;
            --radius: 0.75rem;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --panel: #1e293b;
            --sidebar: #0f172a;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-fg: #ffffff;
        }

        body {
            font-family: 'Geist Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }

        .premium-shadow {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        .segmented-control {
            background: var(--bg);
            padding: 2px;
            border-radius: 0.5rem;
            display: flex;
            border: 1px solid var(--border);
        }

        .segmented-button {
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            border-radius: 0.375rem;
            transition: all 0.2s;
        }

        .segmented-button.active {
            background: var(--panel);
            color: var(--text);
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        .sidebar-item {
            margin: 2px 8px;
            padding: 8px 12px;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }

        .sidebar-item.active {
            background: var(--panel);
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            color: var(--accent);
        }

        .sidebar-item:hover:not(.active) {
            background: rgba(0,0,0,0.03);
        }

        [data-theme="dark"] .sidebar-item:hover:not(.active) {
            background: rgba(255,255,255,0.03);
        }

        .theme-toggle {
            cursor: pointer;
            padding: 8px;
            border-radius: 9999px;
            transition: background 0.2s;
        }
        .theme-toggle:hover {
            background: var(--border);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="h-14 border-b border-[var(--border)] flex items-center justify-between px-6 bg-[var(--panel)] shrink-0 z-10">
        <div class="flex items-center gap-4">
            <span class="text-sm font-bold tracking-tight text-[var(--accent)]">IntakePad</span>
            <div class="h-4 w-px bg-[var(--border)]"></div>
            <button class="text-xs font-medium text-[var(--text-muted)] hover:text-[var(--text)] flex items-center gap-1.5 transition-colors">
                tinydarkforge/IntakePad
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
            </button>
        </div>
        <div class="flex items-center gap-4">
            <div class="theme-toggle" onclick="toggleTheme()">
                <svg id="sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
                <svg id="moon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </div>
            <button class="text-xs font-semibold px-4 py-2 bg-[var(--accent)] text-[var(--accent-fg)] rounded-full hover:opacity-90 transition-all">
                Sign in
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 border-r border-[var(--border)] bg-[var(--sidebar)] shrink-0 flex flex-col transition-all duration-300">
            <div class="flex-1 flex flex-col pt-4 overflow-y-auto">
                <div class="px-6 mb-4 flex items-center justify-between">
                    <h2 class="text-[10px] font-bold uppercase tracking-widest text-[var(--text-muted)]">Templates</h2>
                    <button class="text-[var(--text-muted)] hover:text-[var(--text)]">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
                    </button>
                </div>
                
                <div class="sidebar-item active">
                    <div class="text-xs font-semibold">Bug Report</div>
                    <div class="text-[10px] opacity-70">Report a software bug</div>
                </div>
                <div class="sidebar-item">
                    <div class="text-xs font-semibold">Feature Request</div>
                    <div class="text-[10px] opacity-70">Suggest a new idea</div>
                </div>
                <div class="sidebar-item">
                    <div class="text-xs font-semibold">Blank issue</div>
                    <div class="text-[10px] opacity-70">Start from scratch</div>
                </div>
            </div>

            <!-- Sidebar Footer -->
            <div class="p-4 border-t border-[var(--border)] bg-[var(--sidebar)]">
                <div class="flex items-center justify-between">
                    <button class="p-2 text-[var(--text-muted)] hover:text-[var(--text)] hover:bg-[var(--border)] rounded-lg transition-colors" title="Settings">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                    <button onclick="toggleSidebar()" class="p-2 text-[var(--text-muted)] hover:text-[var(--text)] hover:bg-[var(--border)] rounded-lg transition-colors" title="Collapse Sidebar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2Zm-10 0v18"/></svg>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 bg-[var(--panel)] overflow-hidden flex flex-col">
            <div class="flex-1 flex flex-col px-10 py-8 overflow-y-auto">
                <div class="flex items-center justify-between mb-8">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-[var(--text-muted)]">Drafting Issue</span>
                    <div class="segmented-control">
                        <button class="segmented-button active">Edit</button>
                        <button class="segmented-button">Preview</button>
                    </div>
                </div>

                <input type="text" class="w-full text-3xl font-bold bg-transparent border-none outline-none placeholder:text-[var(--border)] mb-6" value="Fix sidebar toggle position">

                <textarea class="flex-1 w-full bg-transparent border-none outline-none resize-none text-base leading-relaxed placeholder:text-[var(--text-muted)]" placeholder="Paste your messy notes here..."></textarea>
            </div>

            <!-- Footer Toolbar -->
            <div class="h-16 border-t border-[var(--border)] bg-[var(--panel)] flex items-center justify-between px-10 shrink-0">
                <div class="text-[10px] text-[var(--text-muted)] font-medium">Saved 2m ago</div>
                <div class="flex items-center gap-3">
                    <button class="text-xs font-semibold px-4 py-2 text-[var(--text)] border border-[var(--border)] rounded-lg hover:bg-[var(--bg)] transition-colors flex items-center gap-2">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                        Enhance
                    </button>
                    <button class="text-xs font-semibold px-4 py-2 text-[var(--text)] border border-[var(--border)] rounded-lg hover:bg-[var(--bg)] transition-colors">
                        Copy Markdown
                    </button>
                    <button class="text-xs font-semibold px-5 py-2 bg-[var(--accent)] text-[var(--accent-fg)] rounded-lg hover:opacity-90 shadow-lg shadow-indigo-500/20 transition-all">
                        Create Issue
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('sun').classList.toggle('hidden');
            document.getElementById('moon').classList.toggle('hidden');
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.style.width === '0px') {
                sidebar.style.width = '256px';
                sidebar.style.opacity = '1';
                sidebar.style.pointerEvents = 'auto';
            } else {
                sidebar.style.width = '0px';
                sidebar.style.opacity = '0';
                sidebar.style.pointerEvents = 'none';
            }
        }
    </script>
</body>
</html>
