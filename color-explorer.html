<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntakePad — Color Explorer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Geist Sans', system-ui, sans-serif;
  background: #f8fafc;
  color: #0f172a;
  padding: 40px;
  transition: background 0.3s, color 0.3s;
}
[data-theme="dark"] body {
  background: #0f172a;
  color: #f8fafc;
}
.header {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 48px;
}
.header h1 {
  font-size: 14px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.15em; color: #64748b; margin-bottom: 4px;
}
[data-theme="dark"] .header h1 { color: #94a3b8; }
.header p { font-size: 14px; color: #475569; }
[data-theme="dark"] .header p { color: #94a3b8; }
.toggle-btn {
  padding: 8px 20px; background: #1e293b; color: #fff;
  border: none; border-radius: 8px; cursor: pointer;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em;
}
[data-theme="dark"] .toggle-btn { background: #f1f5f9; color: #0f172a; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

.card {
  border: 1px solid #e2e8f0; border-radius: 12px; background: #fff;
  overflow: hidden;
}
[data-theme="dark"] .card { background: #1e293b; border-color: #334155; }
.card-header {
  padding: 14px 18px; border-bottom: 1px solid #e2e8f0;
  display: flex; justify-content: space-between; align-items: center;
}
[data-theme="dark"] .card-header { border-color: #334155; }
.card-header h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
[data-theme="dark"] .card-header h2 { color: #f8fafc; }
.card-header .label {
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: #64748b; background: #f1f5f9;
  padding: 2px 8px; border-radius: 4px;
}
[data-theme="dark"] .card-header .label { background: #334155; color: #94a3b8; }

.preview {
  padding: 28px 20px; display: flex; flex-direction: column; gap: 20px;
}
.row { display: flex; flex-direction: column; gap: 8px; }
.row label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: #94a3b8;
}

.favicon-row {
  display: flex; align-items: center; gap: 16px;
}
.favicon-box {
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  background: var(--demo-bg, #f8fafc);
  border: 1px solid var(--demo-border, #e2e8f0);
}

.ui-sample {
  display: flex; flex-direction: column; gap: 10px; padding: 16px;
  border-radius: 8px;
  background: var(--demo-bg, #f8fafc);
  border: 1px solid var(--demo-border, #e2e8f0);
}
.ui-sample .header-bar {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 700; letter-spacing: -0.01em;
}
.ui-sample .header-bar .name { color: var(--demo-text, #0f172a); }
.ui-sample .btn {
  padding: 6px 16px; border-radius: 6px; border: none;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; cursor: default;
  background: var(--demo-accent, #4f46e5);
  color: var(--demo-accent-fg, #fff);
  align-self: flex-start;
}
.ui-sample .btn-outline {
  background: transparent;
  border: 1px solid var(--demo-border, #e2e8f0);
  color: var(--demo-text-secondary, #475569);
}
.ui-sample .stat {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--demo-text-muted, #64748b);
}
[data-theme="dark"] .ui-sample {
  --demo-bg: #0f172a;
  --demo-border: #334155;
  --demo-text: #f8fafc;
  --demo-text-secondary: #94a3b8;
  --demo-text-muted: #64748b;
}

.demo-bg-light { --demo-bg: #f8fafc; --demo-border: #e2e8f0; --demo-text: #0f172a; --demo-text-secondary: #475569; --demo-text-muted: #64748b; }
.demo-bg-dark  { --demo-bg: #0f172a; --demo-border: #334155; --demo-text: #f8fafc; --demo-text-secondary: #94a3b8; --demo-text-muted: #64748b; }

.hex-display {
  font-family: monospace; font-size: 11px;
  display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px;
}
.hex-display span {
  padding: 2px 8px; border-radius: 4px;
  background: var(--demo-bg, #f8fafc);
  border: 1px solid var(--demo-border, #e2e8f0);
}
[data-theme="dark"] .hex-display span {
  background: #1e293b; border-color: #334155;
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>IntakePad — Color Explorer</h1>
    <p>Each column is a full accent palette. Preview includes favicon, UI sample, and header lockup.</p>
  </div>
  <button class="toggle-btn" onclick="toggleTheme()">Toggle Theme</button>
</div>

<div class="grid" id="grid"></div>

<script>
const palettes = [
  {
    name: "Current Indigo",
    tag: "baseline",
    light: { accent: "#4f46e5", hover: "#4338ca", fg: "#ffffff", soft: "#4f46e512" },
    dark:  { accent: "#6366f1", hover: "#818cf8", fg: "#ffffff", soft: "#6366f122" },
  },
  {
    name: "Warm Charcoal",
    tag: "Linear-like",
    light: { accent: "#292524", hover: "#1c1917", fg: "#fafaf9", soft: "#29252412" },
    dark:  { accent: "#e7e5e4", hover: "#d6d3d1", fg: "#0c0a09", soft: "#e7e5e422" },
  },
  {
    name: "True Slate",
    tag: "Vercel-like",
    light: { accent: "#1e293b", hover: "#0f172a", fg: "#f8fafc", soft: "#1e293b12" },
    dark:  { accent: "#e2e8f0", hover: "#cbd5e1", fg: "#020617", soft: "#e2e8f022" },
  },
  {
    name: "Deep Teal",
    tag: "sophisticated",
    light: { accent: "#0d9488", hover: "#0f766e", fg: "#ffffff", soft: "#0d948812" },
    dark:  { accent: "#2dd4bf", hover: "#5eead4", fg: "#042f2e", soft: "#2dd4bf22" },
  },
  {
    name: "Rose",
    tag: "Stripe-like",
    light: { accent: "#e11d48", hover: "#be123c", fg: "#ffffff", soft: "#e11d4812" },
    dark:  { accent: "#fb7185", hover: "#fda4af", fg: "#4c0519", soft: "#fb718522" },
  },
  {
    name: "Amber",
    tag: "warm",
    light: { accent: "#d97706", hover: "#b45309", fg: "#ffffff", soft: "#d9770612" },
    dark:  { accent: "#fbbf24", hover: "#fcd34d", fg: "#451a03", soft: "#fbbf2422" },
  },
  {
    name: "Violet",
    tag: "creative",
    light: { accent: "#7c3aed", hover: "#6d28d9", fg: "#ffffff", soft: "#7c3aed12" },
    dark:  { accent: "#a78bfa", hover: "#c4b5fd", fg: "#2e1065", soft: "#a78bfa22" },
  },
  {
    name: "Emerald",
    tag: "fresh",
    light: { accent: "#059669", hover: "#047857", fg: "#ffffff", soft: "#05966912" },
    dark:  { accent: "#34d399", hover: "#6ee7b7", fg: "#022c22", soft: "#34d39922" },
  },
]

function faviconSvg(accent) {
  return `<svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path d="M4 6h24L18 20v6h-4v-6L4 6z" fill="${accent}"/><rect x="12" y="26" width="8" height="2" rx="1" fill="${accent}"/></svg>`
}

function render() {
  const isDark = document.documentElement.getAttribute("data-theme") === "dark"
  const grid = document.getElementById("grid")
  grid.innerHTML = palettes.map((p, i) => {
    const c = isDark ? p.dark : p.light
    const demoBg = isDark ? "#0f172a" : "#f8fafc"
    const demoBorder = isDark ? "#334155" : "#e2e8f0"
    const demoText = isDark ? "#f8fafc" : "#0f172a"
    const demoTextSecondary = isDark ? "#94a3b8" : "#475569"
    const demoTextMuted = isDark ? "#64748b" : "#64748b"

    return `
    <div class="card">
      <div class="card-header">
        <h2>${p.name}</h2>
        <span class="label">${p.tag}</span>
      </div>
      <div class="preview">
        <div class="row">
          <label>Favicon</label>
          <div class="favicon-row">
            <div class="favicon-box">${faviconSvg(c.accent)}</div>
            <span style="font-size:11px;color:${demoTextMuted}">16×16 &amp; 32×32</span>
          </div>
        </div>

        <div class="row">
          <label>Header Lockup</label>
          <div class="ui-sample" style="--demo-bg:${demoBg};--demo-border:${demoBorder};--demo-text:${demoText};--demo-text-secondary:${demoTextSecondary};--demo-text-muted:${demoTextMuted}">
            <div class="header-bar">
              ${faviconSvg(c.accent)}
              <span class="name">IntakePad</span>
            </div>
          </div>
        </div>

        <div class="row">
          <label>UI Elements</label>
          <div class="ui-sample" style="--demo-bg:${demoBg};--demo-border:${demoBorder};--demo-text:${demoText};--demo-text-secondary:${demoTextSecondary};--demo-text-muted:${demoTextMuted}">
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn" style="background:${c.accent};color:${c.fg}">Primary</button>
              <button class="btn btn-outline" style="border-color:${demoBorder};color:${demoTextSecondary}">Secondary</button>
            </div>
            <span class="stat" style="color:${c.accent}">● Active accent</span>
            <span class="stat" style="color:${demoTextMuted}">○ Muted text</span>
          </div>
        </div>

        <div class="row">
          <label>Hex Values</label>
          <div class="hex-display">
            <span>accent: ${c.accent}</span>
            <span>hover: ${c.hover}</span>
            <span>fg: ${c.fg}</span>
          </div>
        </div>
      </div>
    </div>`
  }).join("")
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute("data-theme") === "dark";
  html.setAttribute("data-theme", isDark ? "light" : "dark");
  render();
}

render()
</script>

<p style="margin-top:40px;font-size:11px;color:#94a3b8;">
  Palettes shown on a neutral background. Toggle light/dark to see both modes. <br>
  <strong>Baseline</strong> = current. Compare readability and premium feel across options.
</p>

</body>
</html>
